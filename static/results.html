<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Letterboxd Recommender</title>
  <link rel="stylesheet" href="/styles.css?v=2">
  <style>
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      padding: 0 1.25rem 5rem;
    }

    /* ---- Loading Overlay ---- */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 50;
    }

    .spinner {
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-2);
      letter-spacing: 0.04em;
    }

    /* ---- Top Bar ---- */
    .top-bar-left {
      position: fixed;
      top: 1.25rem;
      left: 1.25rem;
      z-index: 100;
    }

    .top-bar-right {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 100;
    }

    .export-button {
      padding: 0.45rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .export-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .final-timer {
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 0.78rem;
      color: var(--text-3);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }

    .live-status {
      display: none;
      position: fixed;
      top: 3.75rem;
      right: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.75rem;
      max-width: 380px;
      z-index: 99;
      font-size: 0.75rem;
      color: var(--text-2);
    }

    /* ---- Container ---- */
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ---- Header ---- */
    .header-info {
      text-align: center;
      padding: 5.5rem 0 2.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400;
      font-size: 2rem;
      color: var(--text-1);
    }

    .sub-info {
      font-size: 0.8rem;
      color: var(--text-3);
      margin-top: 0.4rem;
    }

    /* ---- Preferences Row ---- */
    .preferences {
      display: flex;
      justify-content: center;
      gap: 3rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .pref-item {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-width: 0;
    }

    .pref-item strong {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      font-weight: 500;
    }

    .pref-item span {
      font-size: 0.82rem;
      color: var(--text-2);
    }

    .pref-chip {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-2);
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      margin: 2px 3px 2px 0;
    }

    /* ---- Controls Section ---- */
    .controls-section {
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .control-title {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      font-weight: 500;
    }

    /* ---- Platform Filters ---- */
    .platform-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .platform-checkbox {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .platform-label {
      background: var(--surface);
      color: var(--text-2);
      padding: 0.3rem 0.75rem;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      font-weight: 500;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      user-select: none;
    }

    .platform-label:hover {
      border-color: oklch(38% 0.04 143);
      color: var(--text-1);
    }

    .platform-checkbox:checked + .platform-label {
      background: oklch(18% 0.035 143);
      color: var(--accent);
      border-color: oklch(35% 0.06 143);
    }

    .platform-checkbox:focus-visible + .platform-label {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ---- Sort Buttons ---- */
    .sort-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .sort-btn {
      background: var(--surface);
      color: var(--text-2);
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .sort-btn:hover {
      border-color: oklch(38% 0.04 143);
      color: var(--text-1);
    }

    .sort-btn.active {
      background: oklch(18% 0.035 143);
      color: var(--accent);
      border-color: oklch(35% 0.06 143);
    }

    .sort-btn.green {
      background: oklch(18% 0.035 143);
      color: var(--accent);
      border-color: oklch(35% 0.06 143);
    }

    .sort-btn.red {
      background: var(--surface);
      color: var(--danger);
      border-color: oklch(32% 0.06 25);
    }

    .sort-btn.red:hover {
      background: oklch(16% 0.04 25);
      border-color: oklch(38% 0.08 25);
    }

    /* ---- Results Counter ---- */
    .results-counter {
      font-size: 0.78rem;
      color: var(--text-3);
      margin-bottom: 1.25rem;
      min-height: 1.5rem;
      letter-spacing: 0.02em;
    }

    /* ---- Grid ---- */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 14px;
    }

    .movie-card.hidden { display: none; }

    /* ---- Animations ---- */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .header-info { padding-top: 4.5rem; }
      .preferences { gap: 1.5rem; }
      .movies-grid { grid-template-columns: repeat(3, 1fr); }
      .top-bar-left { top: 0.75rem; left: 0.75rem; }
      .top-bar-right { top: 0.75rem; right: 0.75rem; }
      .live-status { top: 3rem; left: 0; right: 0; border-radius: 0; max-width: 100%; }
    }

    @media (max-width: 480px) {
      .movies-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="spinner">Loading data...</div>
    <div style="font-size:0.78rem;color:var(--text-3)">Fetching latest recommendations</div>
  </div>

  <div class="top-bar-left">
    <button class="export-button" onclick="exportToExcel()">Export to Excel</button>
  </div>

  <div class="top-bar-right">
    <div class="final-timer" id="timerDisplay">--:--</div>
  </div>
  <div class="live-status" id="liveStatusDisplay"></div>

  <div class="container">
    <div class="header-info">
      <h1 id="pageTitle">Recommendations</h1>
      <div class="sub-info" id="pageSub">Detected Country: --</div>
    </div>

    <div class="preferences">
      <div class="pref-item">
        <strong>Favorite Genres</strong>
        <span id="p-genres">-</span>
      </div>
      <div class="pref-item">
        <strong>Top Directors</strong>
        <span id="p-directors">-</span>
      </div>
      <div class="pref-item">
        <strong>Eras</strong>
        <span id="p-decades">-</span>
      </div>
    </div>

    <div class="controls-section">
      <div class="control-group">
        <div class="control-title">Filter by Platform</div>
        <div class="platform-filters" id="platformFilters"></div>
        <div style="margin-top:0.5rem">
          <button class="sort-btn red" onclick="clearAllFilters()">Clear Filters</button>
        </div>
      </div>

      <div class="control-group">
        <div class="control-title">Sort</div>
        <div class="sort-buttons">
          <button class="sort-btn" onclick="sortMovies('rating-desc')">Rating, high first</button>
          <button class="sort-btn" onclick="sortMovies('rating-asc')">Rating, low first</button>
          <button class="sort-btn" onclick="sortMovies('runtime-desc')">Runtime, long first</button>
          <button class="sort-btn" onclick="sortMovies('runtime-asc')">Runtime, short first</button>
          <button class="sort-btn green active" onclick="sortMovies('original')">Original Order</button>
        </div>
      </div>
    </div>

    <div class="results-counter" id="resultsCounter">Showing 0 of 0 films</div>

    <div class="movies-grid" id="grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="/app.js?v=2"></script>
  <script>
    // Global variables
    const username = window.location.pathname.substring(1);
    let moviesData = [];
    let originalMoviesData = [];
    let selectedPlatforms = new Set();
    let currentSort = 'original';
    let userCountryName = 'Global';
    let userCountryCode = '';
    let statusEventSource = null;
    document.title = `Results for ${username}`;
    document.getElementById('pageTitle').textContent = `For: ${username}`;

    // Format milliseconds to MM:SS display for timer.
    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    // Detect the visitor's country before requesting recommendations.
    window.addEventListener('load', async () => {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        userCountryCode = data.country_code || 'US';
        userCountryName = data.country_name || 'Global';
      } catch (e) {
        userCountryCode = 'US';
      }
      init();
    });

    // Initialize app
    async function init() {
      const cacheKey = `lb_data_${username}`;
      const cached = localStorage.getItem(cacheKey);
      const CACHE_TTL_MS = 30 * 60 * 1000; // matches the server's fresh-profile TTL

      if (cached) {
        try {
          const parsed = JSON.parse(cached);
          const fresh = parsed.timestamp && (Date.now() - parsed.timestamp) < CACHE_TTL_MS;
          if (fresh && parsed.data && parsed.data.recommendations) {
            render(parsed.data);
            if (parsed.executionTime) {
              document.getElementById('timerDisplay').textContent = formatTime(parsed.executionTime);
            }
            document.getElementById('loader').style.display = 'none';
            return;
          }
          localStorage.removeItem(cacheKey); // stale or malformed: refetch
        } catch(e) {
          console.error("Cache parse error", e);
          localStorage.removeItem(cacheKey);
        }
      }

      // Fetch from API if no cache - with live timer
      const start = new Date();
      let timerInterval = null;
      const liveStatusDisplay = document.getElementById('liveStatusDisplay');
      const requestId = (window.crypto && window.crypto.randomUUID)
        ? window.crypto.randomUUID()
        : `req_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;

      statusEventSource = createReconnectingStream(
        `/api/status-stream?request_id=${encodeURIComponent(requestId)}`,
        (event) => {
          try {
            const payload = JSON.parse(event.data);
            if (payload.status === 'complete') {
              liveStatusDisplay.style.display = 'none';
              if (statusEventSource) {
                statusEventSource.close();
                statusEventSource = null;
              }
              return;
            }
            const rating = Number(payload.user_rating || 0).toFixed(1);
            liveStatusDisplay.textContent = `Analyzing: ${payload.title} — ${payload.username}'s rating: ${rating}`;
            liveStatusDisplay.style.display = 'block';
          } catch (err) {
            console.warn('Status stream parse error', err);
          }
        },
        (state) => {
          if (state === 'reconnecting') {
            liveStatusDisplay.textContent = 'Reconnecting…';
            liveStatusDisplay.style.display = 'block';
          } else if (state === 'failed') {
            liveStatusDisplay.style.display = 'none';
          }
        }
      );

      timerInterval = setInterval(() => {
        const elapsed = new Date() - start;
        document.getElementById('timerDisplay').textContent = formatTime(elapsed);
      }, 100);

      try {
        const res = await fetchWithTimeout('/api/recommend', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            username: username,
            country: userCountryCode,
            include_streaming: true,
            request_id: requestId
          })
        });

        let data = await res.json();

        if (!res.ok && res.status !== 202) throw new Error(data.error);

        // 202 = async job accepted: poll /api/result until the pipeline finishes.
        if (res.status === 202) {
          data = await pollForResult(data.request_id || requestId);
        }

        const timeTaken = new Date() - start;
        clearInterval(timerInterval);
        render(data);
        document.getElementById('timerDisplay').textContent = formatTime(timeTaken);

      } catch(e) {
        clearInterval(timerInterval);
        document.querySelector('.spinner').textContent = "Error loading";
        document.querySelector('.loading-overlay div:last-child').textContent = e.message;
      } finally {
        liveStatusDisplay.style.display = 'none';
        if (statusEventSource) {
          statusEventSource.close();
          statusEventSource = null;
        }
        if (document.getElementById('grid').children.length > 0) {
          document.getElementById('loader').style.display = 'none';
        }
      }
    }

    // Render the complete recommendation payload into the page.
    function render(data) {
      moviesData = data.recommendations || [];
      originalMoviesData = [...moviesData];
      userCountryName = data.country_name || userCountryName;
      if (data.country_code) {
        userCountryCode = data.country_code;
      }

      document.getElementById('pageSub').textContent =
        `Based on your profile. Region: ${userCountryName} ${countryCodeToFlag(userCountryCode)}`;

      const toChips = arr => arr.length
        ? arr.map(v => `<span class="pref-chip">${v}</span>`).join('')
        : 'N/A';
      document.getElementById('p-genres').innerHTML   = toChips(data.preferences?.genres    || []);
      document.getElementById('p-directors').innerHTML = toChips(data.preferences?.directors || []);
      document.getElementById('p-decades').innerHTML  = toChips(data.preferences?.decades   || []);

      // Extract all unique streaming platforms
      const allPlatforms = new Set();
      moviesData.forEach(m => {
        (m.streaming || []).forEach(p => allPlatforms.add(p));
      });

      // Render platform filters
      const platformContainer = document.getElementById('platformFilters');
      platformContainer.innerHTML = '';

      const sortedPlatforms = Array.from(allPlatforms).sort();
      sortedPlatforms.forEach(platform => {
        const id = `platform-${platform.replace(/\s+/g, '-')}`;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.id = id;
        checkbox.className = 'platform-checkbox';
        checkbox.addEventListener('change', () => togglePlatform(platform));

        const label = document.createElement('label');
        label.htmlFor = id;
        label.className = 'platform-label';
        label.textContent = platform;

        platformContainer.appendChild(checkbox);
        platformContainer.appendChild(label);
      });

      renderMovies();
      animateEntrance();
    }

    // Cache frequently accessed DOM nodes once the page is loaded.
    let _grid, _resultsCounter;
    let _hasAnimated = false;
    function _getGrid() { return _grid || (_grid = document.getElementById('grid')); }
    function _getCounter() { return _resultsCounter || (_resultsCounter = document.getElementById('resultsCounter')); }

    function animateEntrance() {
      const els = ['.header-info', '.preferences', '.controls-section', '.results-counter', '.movies-grid'];
      els.forEach((sel, i) => {
        const el = document.querySelector(sel);
        if (!el) return;
        el.style.opacity = '0';
        el.style.animation = `fadeSlideIn 380ms cubic-bezier(0.25, 1, 0.5, 1) ${i * 60}ms forwards`;
      });
    }

    // Render the movie cards into the grid, honoring filters.
    function renderMovies() {
      const grid = _getGrid();
      grid.innerHTML = '';

      let visibleCount = 0;
      let renderIdx = 0;
      const noStreamMsg = `Not on streaming in ${userCountryName} ${countryCodeToFlag(userCountryCode)}`;

      moviesData.forEach((m, index) => {
        const div = document.createElement('div');
        div.className = 'movie-card';
        div.dataset.index = index;

        const isVisible = selectedPlatforms.size === 0 ||
          (m.streaming || []).some(p => selectedPlatforms.has(p));

        if (!isVisible) {
          div.classList.add('hidden');
        } else {
          visibleCount++;
          if (!_hasAnimated) {
            div.style.opacity = '0';
            div.style.animation = `fadeSlideIn 330ms cubic-bezier(0.25, 1, 0.5, 1) ${Math.min(renderIdx * 45, 600)}ms both`;
            renderIdx++;
          }
        }

        const platforms = (m.streaming || [])
          .map(p => `<span class="platform" style="${getPlatformStyle(p)}">${p}</span>`)
          .join('');

        const streamHtml = platforms
          ? `<div class="streaming-sec">${platforms}</div>`
          : `<div class="streaming-sec"><span class="unavailable-note">${noStreamMsg}</span></div>`;

        const poster = m.poster || 'https://via.placeholder.com/300x450?text=No+Poster';
        const runtime = m.runtime ? `${m.runtime} min` : 'N/A';

        div.innerHTML = `
          <img src="${poster}" class="movie-poster" loading="lazy" alt="${m.title}">
          <div class="movie-info">
            <div class="title">${m.title}</div>
            <div class="meta">${m.year || 'N/A'} &middot; ${m.director || 'Unknown'}</div>
            <div class="meta">${runtime}</div>
            <div class="rating">${m.rating_tmdb || 'N/A'}</div>
            <div class="reason">${m.reason || 'Recommended for you'}</div>
            ${streamHtml}
          </div>
        `;

        grid.appendChild(div);
      });

      _getCounter().textContent = `Showing ${visibleCount} of ${moviesData.length} films`;
      _hasAnimated = true;
    }

    // Toggle a streaming platform filter and re-render the grid.
    function togglePlatform(platform) {
      if (selectedPlatforms.has(platform)) {
        selectedPlatforms.delete(platform);
      } else {
        selectedPlatforms.add(platform);
      }
      renderMovies();
    }

    // Remove every active streaming filter.
    function clearAllFilters() {
      selectedPlatforms.clear();
      document.querySelectorAll('.platform-checkbox').forEach(checkbox => {
        checkbox.checked = false;
      });
      renderMovies();
    }

    // Sort movie cards according to the selected criterion.
    function sortMovies(type) {
      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      currentSort = type;

      switch(type) {
        case 'rating-desc':
          moviesData.sort((a, b) => (b.rating_tmdb || 0) - (a.rating_tmdb || 0));
          break;
        case 'rating-asc':
          moviesData.sort((a, b) => (a.rating_tmdb || 0) - (b.rating_tmdb || 0));
          break;
        case 'runtime-desc':
          moviesData.sort((a, b) => (b.runtime || 0) - (a.runtime || 0));
          break;
        case 'runtime-asc':
          moviesData.sort((a, b) => (a.runtime || 0) - (b.runtime || 0));
          break;
        case 'original':
          moviesData = [...originalMoviesData];
          break;
      }

      renderMovies();
    }

    // Export the current recommendation data set to an Excel file.
    function exportToExcel() {
      if (!moviesData.length) {
        alert('No data to export');
        return;
      }

      const ws = XLSX.utils.json_to_sheet(moviesData.map(m => ({
        Title: m.title,
        Year: m.year,
        Rating: m.rating_tmdb,
        Runtime: m.runtime,
        Director: m.director,
        Genres: (m.genres || []).join(', '),
        Reason: m.reason,
        Streaming: (m.streaming || []).join(', ')
      })));

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Recommendations");
      XLSX.writeFile(wb, `recommendations_${username}_${Date.now()}.xlsx`);
    }
  </script>
</body>
</html>
