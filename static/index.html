<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>Letterboxd Recommender</title>
  <link rel="stylesheet" href="/styles.css?v=2">
  <style>
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1.25rem 5rem;
    }

    /* ---- Hero ---- */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 6rem 0 2.5rem;
      width: 100%;
      max-width: 540px;
    }

    .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400;
      font-size: 3rem;
      line-height: 1.1;
      color: var(--text-1);
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: 0.93rem;
      color: var(--text-2);
      max-width: 360px;
      margin-bottom: 0.4rem;
    }

    .byline {
      font-size: 0.75rem;
      color: var(--text-3);
      margin-bottom: 2.75rem;
    }

    .byline a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.15s;
    }
    .byline a:hover { color: var(--accent-hi); }

    /* ---- Country Pill ---- */
    .country-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.28rem 0.85rem;
      font-size: 0.75rem;
      color: var(--text-3);
      margin-bottom: 1.5rem;
    }

    /* ---- Search Row ---- */
    .search-row {
      display: flex;
      width: 100%;
      max-width: 440px;
      gap: 0.5rem;
    }

    #username {
      flex: 1;
      padding: 0.72rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-1);
      font-family: inherit;
      font-size: 0.93rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #username::placeholder { color: var(--text-3); }

    #username:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px oklch(72% 0.11 143 / 0.14);
    }

    #btn {
      padding: 0.72rem 1.35rem;
      background: var(--accent);
      color: oklch(12% 0.008 60);
      border: none;
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }

    #btn:hover:not(:disabled) { background: var(--accent-hi); }
    #btn:active:not(:disabled) { transform: scale(0.97); }
    #btn:disabled {
      background: var(--surface-hi);
      color: var(--text-3);
      cursor: wait;
    }

    #recommendations-btn {
      display: none;
      width: 100%;
      max-width: 440px;
      padding: 0.72rem 1.5rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-1);
      border-radius: 7px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: border-color 0.15s, color 0.15s;
    }

    #recommendations-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ---- Loading State ---- */
    .loading-box {
      display: none;
      width: 100%;
      max-width: 440px;
      margin-top: 2rem;
    }

    .loading-primary {
      display: flex;
      align-items: baseline;
      gap: 0.85rem;
      margin-bottom: 0.85rem;
    }

    .timer {
      font-family: 'Consolas', 'SF Mono', 'Roboto Mono', monospace;
      font-size: 1.5rem;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .status {
      font-size: 0.8rem;
      color: var(--text-2);
    }

    .progress-wrap { width: 100%; }

    .progress-label {
      font-size: 0.69rem;
      color: var(--text-3);
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: var(--surface-hi);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    /* ---- Live Log ---- */
    .live-log-box {
      display: none;
      width: 100%;
      max-width: 440px;
      margin-top: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.55rem 0.75rem;
      max-height: 150px;
      overflow-y: auto;
    }

    .live-log-line {
      font-family: 'Consolas', 'SF Mono', monospace;
      font-size: 0.69rem;
      color: var(--text-3);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .live-log-box::-webkit-scrollbar { width: 3px; }
    .live-log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    /* ---- Live Recommendations ---- */
    .recommendations-live {
      display: none;
      width: 100%;
      max-width: 1080px;
      margin-top: 4rem;
    }

    .recommendations-live h2 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400;
      font-size: 1.3rem;
      color: var(--text-1);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .recommendations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 14px;
    }

    /* ---- Page Transition ---- */
    @keyframes pageFadeOut {
      to { opacity: 0; }
    }
    .page-exiting {
      animation: pageFadeOut 180ms ease forwards;
      pointer-events: none;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .hero { padding-top: 3.5rem; }
      h1 { font-size: 2.25rem; }
      .search-row { flex-direction: column; }
      #btn { width: 100%; }
      .recommendations-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="hero">
    <p class="eyebrow">Letterboxd Recommender</p>
    <h1>Find your next<br>great film.</h1>
    <p class="tagline">Personalized picks generated from your Letterboxd ratings and watchlist.</p>
    <div class="byline">
      Built by <a href="https://github.com/based-on-what/letterboxd-recommender" target="_blank" rel="noopener noreferrer">@based-on-what</a>
    </div>

    <div id="country-info" class="country-pill">
      Searching in: --
    </div>

    <div class="search-row">
      <input type="text" id="username" placeholder="e.g. davidehrlich" onkeypress="if(event.key==='Enter')startProcess()" autocomplete="off" spellcheck="false">
      <button id="btn" onclick="startProcess()">Recommend</button>
    </div>
    <button id="recommendations-btn" onclick="navigateToRecommendations()"></button>

    <div id="loading" class="loading-box">
      <div class="loading-primary">
        <div class="timer" id="chronometer">00:00.00</div>
        <div class="status">Analyzing profile &amp; fetching data...</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label" id="progress-label">Progress: 0%</div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <div id="live-log-box" class="live-log-box"></div>
    </div>
  </div>

  <section class="recommendations-live" id="recommendations-live">
    <h2>Recommendations Found</h2>
    <div class="recommendations-grid" id="recommendations-grid"></div>
  </section>

  <script src="/app.js?v=2"></script>
  <script>
    let startTime;
    let timerInterval;
    let userCountry = 'CL';
    let userCountryName = 'Global';
    let eventSource; // Track EventSource connection
    let recsEventSource; // Track recommendations EventSource connection
    let statusEventSource; // Track status EventSource connection
    let activeRequestId = null;
    let liveRecommendations = []; // Store recommendations shown in real-time
    let shownMovieIds = new Set(); // Track movie IDs already displayed to prevent duplicates
    let totalSeedFilms = 0;
    let processedSeedFilms = 0;

    // Detect the visitor's country to personalize streaming region.
    window.onload = async () => {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        userCountry = data.country_code || 'CL';
        userCountryName = data.country_name || 'Global';

        const flagEmoji = countryCodeToFlag(userCountry);
        document.getElementById('country-info').textContent =
          `Searching in: ${userCountryName} ${flagEmoji}`;
      } catch (e) {}
    };

    // Update the on-screen chronometer while recommendations are generated.
    function updateTimer() {
      const diff = new Date() - startTime;
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      const ms = Math.floor((diff % 1000) / 10);
      document.getElementById('chronometer').textContent =
        `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
    }

    // Reflect SSE connection health in the loading status line.
    function updateStreamHealth(state) {
      const statusEl = document.querySelector('.status');
      if (!statusEl) return;
      if (state === 'reconnecting') {
        statusEl.textContent = 'Reconnecting…';
      } else if (state === 'failed') {
        statusEl.textContent = 'Live updates lost — results will still load when ready.';
      } else {
        statusEl.textContent = 'Analyzing profile & fetching data...';
      }
    }

    // Connect to SSE logs stream
    function connectToLogsStream(requestId) {
      if (eventSource) {
        eventSource.close();
      }

      eventSource = createReconnectingStream(
        `/api/logs-stream?request_id=${encodeURIComponent(requestId)}`,
        function(event) {
          if (event.data && event.data !== 'heartbeat') {
            console.log('[SERVER]', event.data);
            addLiveLogLine(event.data);
            updateProgressFromLog(event.data);
          }
        },
        updateStreamHealth
      );
    }

    // Connect to status stream to track seed-film processing.
    function connectToStatusStream(requestId) {
      if (statusEventSource) {
        statusEventSource.close();
      }

      statusEventSource = createReconnectingStream(
        `/api/status-stream?request_id=${encodeURIComponent(requestId)}`,
        function(event) {
          if (!event.data || event.data === 'heartbeat') return;
          try {
            const payload = JSON.parse(event.data);
            if (payload.status === 'complete') {
              setProgress(98, 'Finalizing recommendations...');
              disconnectFromStatusStream();
              return;
            }

            if (payload.title) {
              processedSeedFilms += 1;
              const ratio = totalSeedFilms > 0 ? Math.min(1, processedSeedFilms / totalSeedFilms) : 0;
              const pct = 60 + Math.round(ratio * 35);
              setProgress(pct, `Analyzing favorites: ${processedSeedFilms}/${Math.max(totalSeedFilms, processedSeedFilms)}`);
              addLiveLogLine(`Analyzing: ${payload.title} (${payload.user_rating || 0}★)`);
            }
          } catch (_e) {}
        }
      );
    }

    function disconnectFromStatusStream() {
      if (statusEventSource) {
        statusEventSource.close();
        statusEventSource = null;
      }
    }

    function setProgress(percent, labelText) {
      const clamped = Math.max(0, Math.min(100, percent));
      document.getElementById('progress-fill').style.width = `${clamped}%`;
      document.getElementById('progress-label').textContent = labelText || `Progress: ${clamped}%`;
    }

    function addLiveLogLine(message) {
      const box = document.getElementById('live-log-box');
      if (!message || message === 'heartbeat') return;
      box.style.display = 'block';
      const line = document.createElement('div');
      line.className = 'live-log-line';
      line.textContent = `[SERVER] ${message}`;
      box.appendChild(line);
      while (box.children.length > 40) {
        box.removeChild(box.firstChild);
      }
      box.scrollTop = box.scrollHeight;
    }

    // Compiled regex patterns for log-based progress detection (avoids re-compiling on each SSE event).
    const _RE_SEED_COUNT      = /Total films with 4\+ stars:\s*(\d+)/i;
    const _RE_FETCHED         = /Fetched\s+\d+\s+films/i;
    const _RE_ENRICH_PROGRESS = /Enrichment progress:\s*(\d+)\/(\d+)/i;
    const _RE_ENRICHED        = /Enrichment completed/i;
    const _RE_DONE            = /Returning\s+\d+\s+recommendations|ANALYSIS COMPLETE/i;

    function updateProgressFromLog(message) {
      const text = String(message || '');

      // Phase: fetching profile (0→25%)
      if (_RE_FETCHED.test(text)) {
        setProgress(25, 'Profile fetched, enriching with TMDB...');
        return;
      }

      // Phase: TMDB enrichment (25→55%) — updated on every progress log line
      const enrichMatch = _RE_ENRICH_PROGRESS.exec(text);
      if (enrichMatch) {
        const done  = Number.parseInt(enrichMatch[1], 10);
        const total = Number.parseInt(enrichMatch[2], 10) || 1;
        const pct   = 25 + Math.round((done / total) * 30);
        setProgress(pct, `Enriching with TMDB: ${done}/${total}`);
        return;
      }

      // Phase: enrichment finished, preference analysis (55%)
      if (_RE_ENRICHED.test(text)) {
        setProgress(55, 'Preferences detected, preparing recommendations...');
        return;
      }

      // Phase: similar-movie search begins (60%) + seed-film counter
      const starMatch = _RE_SEED_COUNT.exec(text);
      if (starMatch) {
        totalSeedFilms = Number.parseInt(starMatch[1], 10) || 0;
        processedSeedFilms = 0;
        setProgress(60, `Analyzing favorites: 0/${totalSeedFilms}`);
        return;
      }

      // Phase: done (100%)
      if (_RE_DONE.test(text)) {
        setProgress(100, 'Progress: 100%');
      }
    }

    function resetLiveProgressUi() {
      totalSeedFilms = 0;
      processedSeedFilms = 0;
      setProgress(0, 'Progress: 0%');
      const box = document.getElementById('live-log-box');
      box.innerHTML = '';
      box.style.display = 'none';
    }

    // Disconnect from logs stream
    function disconnectFromLogsStream() {
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
    }

    // Connect to recommendations stream
    function connectToRecommendationsStream(requestId) {
      if (recsEventSource) {
        recsEventSource.close();
      }

      recsEventSource = createReconnectingStream(
        `/api/recommendations-stream?request_id=${encodeURIComponent(requestId)}`,
        function(event) {
          try {
            const data = JSON.parse(event.data);

            if (data.status === 'complete') {
              disconnectFromRecommendationsStream();
              return;
            }

            // Add recommendation to live display
            liveRecommendations.push(data);
            addRecommendationToGrid(data);

          } catch (e) {
            console.error('[RECS] Error parsing recommendation:', e);
          }
        }
      );
    }

    // Disconnect from recommendations stream
    function disconnectFromRecommendationsStream() {
      if (recsEventSource) {
        recsEventSource.close();
        recsEventSource = null;
      }
    }

    // Add a movie card to the live recommendations grid
    function addRecommendationToGrid(movie) {
      // Prevent duplicates
      const movieId = movie.title + '_' + movie.year;
      if (shownMovieIds.has(movieId)) {
        console.log('[DUPLICATE PREVENTED]', movie.title);
        return;
      }
      shownMovieIds.add(movieId);

      const grid = document.getElementById('recommendations-grid');
      const liveSection = document.getElementById('recommendations-live');

      if (liveSection.style.display === 'none') {
        liveSection.style.display = 'block';
      }

      const card = document.createElement('div');
      card.className = 'movie-card';
      const staggerDelay = Math.min((liveRecommendations.length - 1) * 60, 180);
      card.style.animation = `slideIn 350ms cubic-bezier(0.25, 1, 0.5, 1) ${staggerDelay}ms both`;

      const posterUrl = movie.poster || 'https://via.placeholder.com/300x450?text=No+Poster';
      const runtime = movie.runtime ? `${movie.runtime} min` : 'N/A';
      const director = movie.director || 'Unknown';

      let streamingHtml = '';
      if (movie.streaming && movie.streaming.length > 0) {
        const platforms = movie.streaming
          .map(p => `<span class="platform" style="${getPlatformStyle(p)}">${p}</span>`)
          .join('');
        streamingHtml = `<div class="streaming-sec">${platforms}</div>`;
      } else {
        const flagEmoji = countryCodeToFlag(userCountry);
        streamingHtml = `<div class="streaming-sec"><span class="unavailable-note">Not on streaming in ${userCountryName} ${flagEmoji}</span></div>`;
      }

      card.innerHTML = `
        <img src="${posterUrl}" class="movie-poster" loading="lazy" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
        <div class="movie-info">
          <div class="title">${movie.title}</div>
          <div class="meta">${movie.year || 'N/A'} &middot; ${director}</div>
          <div class="meta">${runtime}</div>
          <div class="rating">${movie.rating_tmdb || 'N/A'}</div>
          <div class="reason">${movie.reason || 'Recommended for you'}</div>
          ${streamingHtml}
        </div>
      `;

      grid.appendChild(card);
    }

    // Clear live recommendations display
    function clearLiveRecommendations() {
      const grid = document.getElementById('recommendations-grid');
      const liveSection = document.getElementById('recommendations-live');

      grid.innerHTML = '';
      liveSection.style.display = 'none';
      liveRecommendations = [];
      shownMovieIds.clear();
    }

    // Kick off the recommendation workflow for a provided username.
    async function startProcess() {
      const username = document.getElementById('username').value.trim();
      if (!username) return alert('Please enter a username');

      clearLiveRecommendations();

      document.getElementById('btn').disabled = true;
      document.getElementById('loading').style.display = 'block';

      activeRequestId = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : `req-${Date.now()}-${Math.random().toString(16).slice(2)}`;

      connectToLogsStream(activeRequestId);
      connectToStatusStream(activeRequestId);
      resetLiveProgressUi();
      setProgress(5, 'Starting analysis...');

      connectToRecommendationsStream(activeRequestId);

      startTime = new Date();
      timerInterval = setInterval(updateTimer, 50);

      try {
        const response = await fetchWithTimeout('/api/recommend', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username, country: userCountry, request_id: activeRequestId})
        });

        let data = await response.json();
        if (!response.ok && response.status !== 202) throw new Error(data.error || 'Unknown error');
        if (data.request_id) {
          activeRequestId = data.request_id;
        }

        // 202 = async job accepted: poll /api/result until the pipeline finishes.
        if (response.status === 202) {
          data = await pollForResult(activeRequestId);
        }

        const endTime = new Date();
        const totalTime = endTime - startTime;

        const cacheKey = `lb_data_${username}`;
        localStorage.setItem(cacheKey, JSON.stringify({
          data: data,
          timestamp: new Date().getTime(),
          executionTime: totalTime
        }));

        clearInterval(timerInterval);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('btn').style.display = 'none';

        disconnectFromLogsStream();
        disconnectFromStatusStream();
        setTimeout(() => disconnectFromRecommendationsStream(), 3000);
        setProgress(100, 'Progress: 100%');

        const recBtn = document.getElementById('recommendations-btn');
        recBtn.textContent = `View ${username}'s recommendations`;
        recBtn.style.display = 'block';

        window.currentUsername = username;

      } catch (e) {
        clearInterval(timerInterval);
        document.getElementById('btn').disabled = false;
        document.getElementById('loading').style.display = 'none';
        disconnectFromLogsStream();
        disconnectFromRecommendationsStream();
        disconnectFromStatusStream();
        alert("Error: " + e.message);
      }
    }

    // Redirect to the results page for the current user.
    function navigateToRecommendations() {
      if (window.currentUsername) {
        document.body.classList.add('page-exiting');
        setTimeout(() => { window.location.href = `/${window.currentUsername}`; }, 180);
      }
    }

    // Clean up on page unload
    window.addEventListener('beforeunload', function() {
      disconnectFromLogsStream();
      disconnectFromRecommendationsStream();
      disconnectFromStatusStream();
    });
  </script>
</body>
</html>
